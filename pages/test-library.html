<!DOCTYPE html>
<!-- Test-library.html -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Library - SCS Test_Hall</title>
    <!-- All HTML script are in the /pages/ folder -->
    <link rel="icon" type="image/png" href="../assets/images/favicon.ico">
    <link rel="stylesheet" href="../scripts/css/font-awesome.min.css">
    <script src="../scripts/auth.js" defer></script>
    <style>
        :root { --primary-color: #020169; --accent-color: #FEC009; }
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f0f2f5; }


    /* --- Hamburger Icon --- */
    .hamburger-icon {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 30px; /* Larger icon */
      color: #020169; /* Blue color for visibility */
      cursor: pointer;
      z-index: 1000; /* Make sure it's above everything */
      background-color: #FEC009; /* Give it a background for contrast */
      padding: 5px 8px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* --- Off-canvas Navigation Menu --- */
    .off-canvas-menu {
      position: fixed;
      top: 0;
      left: -250px; /* Hidden by default, off-screen to the left */
      width: 190px; /* Width of the menu */
      height: 100%;
      background-color: #020169;
      color: #ffff;
      padding-top: 80px; /* Space for the hamburger icon above */
      box-sizing: border-box;
      transition: left 0.3s ease-in-out; /* Smooth slide transition */
      z-index: 999; /* Below the hamburger icon */
      box-shadow: 2px 0 5px rgba(0,0,0,0.5); /* Shadow for depth */
    }

    .off-canvas-menu.open {
      left: 0; /* Slide into view */
    }

    .menu-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .menu-list .menu-item {
      display: flex;
      align-items: center;
      padding: 15px 20px; /* Adjust padding for menu items */
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .menu-list .menu-item i {
      font-size: 20px;
      margin-right: 15px;
      min-width: 25px; /* Ensure icon has consistent width */
    }

    .menu-list .menu-item span {
      white-space: nowrap;
      font-size: 1.1em;
    }

    .menu-list .menu-item:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }
    
    .menu-list .menu-item a {
        color: inherit; /* Inherit color from parent (.off-canvas-menu) */
        text-decoration: none;
        display: flex; /* Make link content flexible */
        align-items: center;
        width: 100%; /* Make the link fill the item */
    }

        main { padding: 20px; padding-top: 80px; }
        .content-container { max-width: 800px; margin: auto; }
        .search-bar { display: flex; margin-bottom: 20px; }
        #search-input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px 0 0 5px; font-size: 1em; }
        #search-button { padding: 10px; border: none; background-color: var(--primary-color); color: var(--accent-color); border-radius: 0 5px 5px 0; cursor: pointer; }
        #exam-list { list-style: none; padding: 0; }
        #exam-list li { margin-bottom: 10px; }
        #exam-list li a { display: block; background-color: #fff; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-decoration: none; color: var(--primary-color); font-weight: bold; transition: all 0.2s ease; border-left: 5px solid var(--accent-color); }
        #exam-list li a:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .loading { text-align: center; padding: 20px; color: #666; font-style: italic; }
        .profile-display-icon { position: fixed; top: 10px; right: 10px; width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; cursor: pointer; z-index: 999; }
        footer { position: fixed; bottom: 0; width: 100%; text-align: center; padding: 10px; background-color: var(--primary-color); color: var(--accent-color); z-index: 1000; }
    </style>
</head>
<body>
  <div class="hamburger-icon" id="hamburger-icon">
    <i class="fas fa-bars"></i>
  </div>

  <nav class="off-canvas-menu" id="off-canvas-menu">
    <ul class="menu-list">
      <li class="menu-item" id="dashboard-link">
        <i class="fas fa-tachometer-alt"></i>
        <span>Dashboard</span>
      </li>
     <li class="menu-item" id="test-library-link">
        <i class="fas fa-book"></i>
        <span>Test Library</span>
      </li>
     <li class="menu-item" id="exam-library-link">
        <i class="fas fa-pencil-alt"></i>
        <span>Take An Exam</span>
      </li>
      <li class="menu-item" id="profile-link">
        <i class="fas fa-user"></i>
        <span>My Profile</span>
      </li>
      <li class="menu-item" id="classes-link">
        <i class="fas fa-users"></i>
        <span>Classes</span>
      </li>
      <li class="menu-item" id="guide-faq-link">
        <i class="fas fa-question-circle"></i>
        <span>Guide & FAQ</span>
      </li>
      <li class="menu-item" id="about-link">
        <i class="fas fa-info-circle"></i>
        <span>About Us</span>
      </li>
      <li class="menu-item" id="contact-link">
        <i class="fas fa-envelope"></i>
        <span>Contact Us</span>
      </li>
      <li class="menu-item" onclick="window.location.href='gamehall.html'">
       <i class="fas fa-gamepad"></i>
       <span>Game Hall</span>
       </li>
      <li class="menu-item" id="logout-button">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
      </li>          
    </ul>
  </nav>


<!-- Test Library HTML -->
<main id="main-content">
    <div class="content-container">
        <h1>Test Library</h1>
        <p id="class-info-text">Showing available Tests...</p>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search your available Test...">
            <button id="search-button"><i class="fas fa-search"></i></button>
        </div>
        <ul id="exam-list"><li class="loading">Loading Test...</li></ul>
    </div>
</main>

    <img id="user-image-display" src="../assets/profile_pictures/default.jpeg" alt="User Profile" class="profile-display-icon">
    <footer>&copy; 2024 SCS Test_Hall</footer>
    <script>
// Get elements from the DOM
const examListElement = document.getElementById('exam-list');
const searchInput = document.getElementById('search-input');
const classInfoText = document.getElementById('class-info-text');
const hamburgerIcon = document.getElementById('hamburger-icon');
const offCanvasMenu = document.getElementById('off-canvas-menu');
const profileDisplayIcon = document.getElementById('user-image-display');
const logoutButton = document.getElementById('logout-button');

// Variables to store exam and user data
let allExams = {};
let userSpecificExams = [];

// Function to fetch exams and user data
const fetchExamsAndUsers = async () => {
    try {
        // Fetch exams data from JSON file
        const examsResponse = await fetch('../data/tests.json');
        const exams = await examsResponse.json();
        allExams = exams;

        // Get logged in user ID from local storage
        const loggedInUserId = localStorage.getItem('loggedInUserId');
        if (!loggedInUserId) {
            throw new Error('No logged in user found');
        }

        // Fetch users data from JSON file
        const usersResponse = await fetch('../data/users.json');
        const users = await usersResponse.json();
        const currentUser = users.find(user => String(user.id) === loggedInUserId);

        if (!currentUser || !currentUser.role) {
            throw new Error('Current user not found or role is missing');
        }

        // Display exams based on user role
        if (currentUser.role.toLowerCase() === 'student') {
            const userClassId = currentUser.classid;
            classInfoText.textContent = `Showing exams for: ${currentUser.class || 'your class'}`;
            userSpecificExams = allExams[userClassId] || [];
        } else {
            // Flatten all exams for admin/teacher view
            userSpecificExams = Object.values(allExams).flat();
            classInfoText.textContent = 'Showing all Available Test (Admin/Teacher view)';
        }

        displayExams(userSpecificExams);
    } catch (error) {
        console.error('Failed to load page data:', error);
        classInfoText.textContent = 'Could not load test data.';
        examListElement.innerHTML = `<li class="loading">Error: ${error.message}</li>`;
    }
};

// Function to display exams
const displayExams = (exams) => {
    examListElement.innerHTML = '';
    if (exams.length === 0) {
        examListElement.innerHTML = '<li class="loading">No test available for your class at this time.</li>';
        return;
    }
    exams.forEach(exam => {
        const listItem = document.createElement('li');
        const anchor = document.createElement('a');
        anchor.href = `test-taking (1).html?test=${encodeURIComponent(exam.fileName)}`;
        anchor.textContent = exam.displayName;
        anchor.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = anchor.href;
        });
        listItem.appendChild(anchor);
        examListElement.appendChild(listItem);
    });
};

// Function to handle search input
const handleSearch = () => {
    const searchTerm = searchInput.value.toLowerCase().trim();
    const filteredExams = userSpecificExams.filter(exam =>
        exam.displayName.toLowerCase().includes(searchTerm)
    );
    displayExams(filteredExams);
};

        // --- Hamburger Menu Toggle ---
        hamburgerIcon.addEventListener('click', () => {
            offCanvasMenu.classList.toggle('open');
        });

        // ===================================================================
        //                      *** THE MAIN FIX IS HERE ***
        // ===================================================================

        // --- Smart Navigation Links Setup ---
        const dashboardLink = document.getElementById('dashboard-link');
        const testLibraryLink = document.getElementById('test-library-link');
        const examTakingLink = document.getElementById('exam-library-link');
        const profileLink = document.getElementById('profile-link');
        const classesLink = document.getElementById('classes-link');
        const guideFaqLink = document.getElementById('guide-faq-link');
        const aboutLink = document.getElementById('about-link');
        const contactLink = document.getElementById('contact-link');

        // SMART DASHBOARD LINK
        dashboardLink.addEventListener('click', () => {
            const userRole = localStorage.getItem('loggedInUserRole');
            let dashboardUrl = 'dashboard.html'; // Default fallback
            if (userRole) {
                const role = userRole.toLowerCase();
                if (role === 'admin') dashboardUrl = 'dashboard-admin.html';
                else if (role === 'teacher') dashboardUrl = 'dashboard-teacher.html';
                else if (role === 'student') dashboardUrl = 'dashboard-student.html';
                else if (role === 'parent') dashboardUrl = 'dashboard-parents.html';
            }
            window.location.href = dashboardUrl;
        });

        // REGULAR LINKS (These don't need special logic)
        testLibraryLink.addEventListener('click', () => { window.location.href = 'test-library.html'; });
        examTakingLink.addEventListener('click', () => { window.location.href = 'exam-library.html'; });
        profileLink.addEventListener('click', () => { window.location.href = 'profile.html'; });
        classesLink.addEventListener('click', () => { window.location.href = 'classes.html'; });
        guideFaqLink.addEventListener('click', () => { window.location.href = 'guide-FAQ.html'; });
        aboutLink.addEventListener('click', () => { window.location.href = 'about.html'; });
        contactLink.addEventListener('click', () => { window.location.href = 'contact.html'; });
        
        
// Logout button functionality
logoutButton.addEventListener('click', () => {
    localStorage.clear();
    window.location.href = 'login.html';
});

// Profile display icon functionality
fetch('../data/users.json')
    .then(response => response.json())
    .then(users => {
        const loggedInUserId = localStorage.getItem('loggedInUserId');
        const currentUser = users.find(user => String(user.id) === loggedInUserId);
        if (currentUser) {
            const profilePicPath = currentUser.profilePicture || '../assets/profile_pictures/default.jpeg';
            profileDisplayIcon.src = profilePicPath;
            profileDisplayIcon.alt = `${currentUser.name}'s Profile Picture`;
            profileDisplayIcon.title = `Go to ${currentUser.name}'s Profile`;
            profileDisplayIcon.style.cursor = 'pointer';
            profileDisplayIcon.onclick = () => {
                window.location.href = 'profile.html';
            };
        }
    })
    .catch(error => {
        console.error('Error loading user data:', error);
    });

// Call fetchExamsAndUsers function and add event listener to search input
fetchExamsAndUsers();
searchInput.addEventListener('input', handleSearch);        
   </script>
</body>
</html>
