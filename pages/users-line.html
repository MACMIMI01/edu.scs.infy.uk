<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Admin Portal - SCS</title>
  
<!-- users-line.html -->     
    
  <meta charset="UTF-8">  
  <meta name="theme-color" content="#EFC009"
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="favicon.ico">
  <link rel="icon" type="image/png" href="../favicon.ico">
  <link rel="icon" type="image/png" href="assets/images/favicon.ico">
      
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <!-- Link to Font Awesome for icons -->
  <link rel="stylesheet" href="../scripts/css/font-awesome.min.css">
  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="../scripts/css/font-awesome.min.css">
    
    <link rel="stylesheet" href="scripts/css/font-awesome.min.css">   
    
    <link rel="stylesheet" href="cbt/scripts/css/font-awesome.min.css">
     
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #020169;
            --primary-light: #2d2b8d;
            --accent: #FEC009;
            --accent-dark: #e6b008;
            --text-dark: #1a1a1a;
            --text-light: #666;
            --bg-light: #f0f2f5;
            --card-bg: #ffffff;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #17a2b8;
            --border-radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        h1, h2, h3 {
            color: var(--primary);
            margin-bottom: 15px;
        }

        .header h1 {
            color: white;
            margin-bottom: 10px;
        }

        .admin-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .admin-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2, 1, 105, 0.1);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 20px;
            border-radius: var(--border-radius);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .table-container {
            overflow-x: auto;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: var(--primary);
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        .student-photo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-light);
        }

        .btn-accent {
            background-color: var(--accent);
            color: var(--primary);
        }

        .btn-accent:hover {
            background-color: var(--accent-dark);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #c82333;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            text-align: center;
            padding: 30px;
            background-color: #ffecec;
            color: var(--danger);
            border-radius: var(--border-radius);
            margin: 20px 0;
        }

        .class-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .password-field {
            font-family: 'Courier New', monospace;
            background-color: #f8f9fa;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: var(--border-radius);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .student-details-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .student-detail-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            margin: 0 auto;
            display: block;
        }

        .detail-group {
            margin-bottom: 15px;
        }

        .detail-label {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .detail-value {
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: var(--border-radius);
        }

        @media (max-width: 768px) {
            .stats-container, .filters {
                grid-template-columns: 1fr;
            }
            
            .admin-info {
                flex-direction: column;
                text-align: center;
            }
            
            .actions {
                flex-direction: column;
            }
            
            th, td {
                padding: 10px;
            }
            
            .student-details-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-user-shield"></i> Admin Portal</h1>
            <div class="admin-info">
                <img id="admin-photo" class="admin-photo" src="../assets/profile_pictures/default.jpeg" alt="Admin Photo">
                <div>
                    <h2 id="admin-name" style="color: #FEC007;">Loading...</h2>
                    <p id="admin-role">Role: Loading...</p>
                </div>
            </div>
        </div>

        <div id="content-area">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading admin portal...</p>
            </div>
        </div>
    </div>

    <!-- Student Detail Modal -->
    <div class="modal" id="studentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Student Details</h3>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div id="modal-body">
                <!-- Student details will be loaded here -->
            </div>
        </div>
    </div>

    <script>
// Enhanced Admin Portal Application
document.addEventListener('DOMContentLoaded', () => {
    // DOM Elements
    const contentArea = document.getElementById('content-area');
    const adminName = document.getElementById('admin-name');
    const adminRole = document.getElementById('admin-role');
    const adminPhoto = document.getElementById('admin-photo');
    const studentModal = document.getElementById('studentModal');
    const modalBody = document.getElementById('modal-body');
    const closeModal = document.getElementById('closeModal');
    
    // Application State
    let currentUser = null;
    let allUsers = [];
    let filteredStudents = [];
    let allClasses = [];

    /**
     * Initializes the application
     */
    const initializeApp = async () => {
        // Check authentication and authorization
        if (!await checkAuthorization()) {
            return;
        }
        
        // Load user data
        await loadUserData();
        
        // Display admin portal
        displayAdminPortal();
    };

    /**
     * Checks if user is authorized to access this page
     * @returns {boolean} True if authorized, false otherwise
     */
    const checkAuthorization = async () => {
        const loggedInUserId = localStorage.getItem('loggedInUserId');
        
        if (!loggedInUserId) {
            window.location.href = 'login.html';
            return false;
        }
        
        // Load users data
        try {
            const response = await fetch('../data/users.json');
            if (!response.ok) throw new Error('Failed to load user data');
            allUsers = await response.json();
            
            // Find current user
            currentUser = allUsers.find(user => user.id == loggedInUserId);
            
            if (!currentUser) {
                showError('User not found. Please log in again.');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                return false;
            }
            
            // Check if user is an admin
            const userRole = currentUser.role.toLowerCase();
            const isAdmin = userRole === 'admin';
            
            if (!isAdmin) {
                showError('Access denied. This portal is for administrators only.');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 3000);
                return false;
            }
            
            return true;
        } catch (error) {
            console.error('Authorization error:', error);
            showError('Error verifying your access rights. Please try again later.');
            return false;
        }
    };

    /**
     * Loads and processes user data
     */
    const loadUserData = async () => {
        try {
            // Get all students
            const students = allUsers.filter(user => user.role.toLowerCase() === 'student');
            
            // Extract unique classes
            const classSet = new Set();
            students.forEach(student => {
                if (student.class) classSet.add(student.class);
            });
            allClasses = Array.from(classSet).sort();
            
            // Initially show all students
            filteredStudents = students;
        } catch (error) {
            console.error('Error loading student data:', error);
            showError('Failed to load student data. Please try again later.');
        }
    };

    /**
     * Displays the admin portal with filters and student list
     */
    const displayAdminPortal = () => {
        // Update admin info
        adminName.textContent = currentUser.name;
        adminRole.textContent = `Role: ${currentUser.role}`;
        
        if (currentUser.profilePicture) {
            adminPhoto.src = currentUser.profilePicture;
        }
        
        // Count male and female students
        const maleCount = filteredStudents.filter(student => student.gender === 'Male').length;
        const femaleCount = filteredStudents.filter(student => student.gender === 'Female').length;
        
        // Create content HTML
        contentArea.innerHTML = `
            <div class="class-info">
                <h2><i class="fas fa-users-cog"></i> Student Management</h2>
                <div>
                    <span class="btn btn-primary">Total Students: ${filteredStudents.length}</span>
                </div>
            </div>
            
            <div class="card">
                <h3><i class="fas fa-filter"></i> Filters</h3>
                <div class="filters">
                    <div class="form-group">
                        <label for="classFilter">Filter by Class:</label>
                        <select id="classFilter">
                            <option value="all">All Classes</option>
                            ${allClasses.map(cls => `<option value="${cls}">${cls}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="genderFilter">Filter by Gender:</label>
                        <select id="genderFilter">
                            <option value="all">All Genders</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="searchFilter">Search by Name:</label>
                        <input type="text" id="searchFilter" placeholder="Enter student name">
                    </div>
                </div>
            </div>
            
            <div class="stats-container">
                <div class="stat-card">
                    <i class="fas fa-male fa-2x"></i>
                    <div class="stat-number">${maleCount}</div>
                    <div class="stat-label">Male Students</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-female fa-2x"></i>
                    <div class="stat-number">${femaleCount}</div>
                    <div class="stat-label">Female Students</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-users fa-2x"></i>
                    <div class="stat-number">${filteredStudents.length}</div>
                    <div class="stat-label">Filtered Students</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-graduation-cap fa-2x"></i>
                    <div class="stat-number">${allClasses.length}</div>
                    <div class="stat-label">Total Classes</div>
                </div>
            </div>
            
            <div class="card">
                <h3><i class="fas fa-list"></i> Student List</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Photo</th>
                                <th>Name</th>
                                <th>Username</th>
                                <th>Class</th>
                                <th>Gender</th>
                                <th>Password</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filteredStudents.length > 0 ? 
                                filteredStudents.map(student => `
                                    <tr>
                                        <td>
                                            <img src="${student.profilePicture || '../assets/profile_pictures/default.jpeg'}" 
                                                 alt="${student.name}" class="student-photo"
                                                 onerror="this.src='../assets/profile_pictures/default.jpeg'">
                                        </td>
                                        <td>${student.name}</td>
                                        <td>${student.username}</td>
                                        <td>${student.class || 'N/A'}</td>
                                        <td>${student.gender || 'N/A'}</td>
                                        <td>
                                            <span class="password-field">${student.password || 'N/A'}</span>
                                        </td>
                                        <td class="actions">
                                            <button class="btn btn-primary" onclick="viewStudent(${student.id})">
                                                <i class="fas fa-eye"></i> View
                                            </button>
                                            <button class="btn btn-accent" onclick="editStudent(${student.id})">
                                                <i class="fas fa-edit"></i> Edit
                                            </button>
                                            <button class="btn btn-accent" onclick="showAutoLoginLink(${student.id})">
                                                <i class="fas fa-link"></i> Auto-Login Link
                                            </button>
                                            <button class="btn btn-danger" onclick="resetPassword(${student.id})">
                                                <i class="fas fa-key"></i> Reset PW
                                            </button>
                                        </td>
                                    </tr>
                                `).join('') : 
                                `<tr>
                                    <td colspan="7" style="text-align: center; padding: 20px;">
                                        No students found matching your filters.
                                    </td>
                                </tr>`
                            }
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        
        // Add event listeners to filters
        document.getElementById('classFilter').addEventListener('change', applyFilters);
        document.getElementById('genderFilter').addEventListener('change', applyFilters);
        document.getElementById('searchFilter').addEventListener('input', applyFilters);
    };

    /**
     * Applies filters to the student list
     */
/**
 * Applies filters to the student list
 */
const applyFilters = () => {
    const classFilter = document.getElementById('classFilter').value;
    const genderFilter = document.getElementById('genderFilter').value;
    const searchFilter = document.getElementById('searchFilter').value.toLowerCase();
    
    // Start with all students
    let students = allUsers.filter(user => user.role.toLowerCase() === 'student');
    
    // Apply class filter
    if (classFilter !== 'all') {
        students = students.filter(student => student.class === classFilter);
    }
    
    // Apply gender filter
    if (genderFilter !== 'all') {
        students = students.filter(student => student.gender === genderFilter);
    }
    
    // Apply search filter
    if (searchFilter) {
        students = students.filter(student => 
            student.name.toLowerCase().includes(searchFilter) || 
            student.username.toLowerCase().includes(searchFilter)
        );
    }
    
    // Update filtered students and refresh display
    filteredStudents = students;
    displayAdminPortal();
    
    // Set selected value of filter options
    document.getElementById('classFilter').value = classFilter;
    document.getElementById('genderFilter').value = genderFilter;
    document.getElementById('searchFilter').value = searchFilter;
};

    /**
     * Displays student details in a modal
     * @param {number} studentId - The ID of the student to view
     */
    const viewStudentDetails = (studentId) => {
        const student = allUsers.find(user => user.id == studentId);
        
        if (!student) {
            alert('Student not found!');
            return;
        }
        
        modalBody.innerHTML = `
            <div class="student-details-grid">
                <div>
                    <img src="${student.profilePicture || '../assets/profile_pictures/default.jpeg'}" 
                         alt="${student.name}" class="student-detail-photo"
                         onerror="this.src='../assets/profile_pictures/default.jpeg'">
                </div>
                <div>
                    <div class="detail-group">
                        <div class="detail-label">Full Name</div>
                        <div class="detail-value">${student.name}</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label">Username</div>
                        <div class="detail-value">${student.username}</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label">Password</div>
                        <div class="detail-value password-field">${student.password || 'Not set'}</div>
                    </div>
                </div>
            </div>
            
            <div class="detail-group">
                <div class="detail-label">Class</div>
                <div class="detail-value">${student.class || 'Not assigned'}</div>
            </div>
            
            <div class="detail-group">
                <div class="detail-label">Gender</div>
                <div class="detail-value">${student.gender || 'Not specified'}</div>
            </div>
            
            <div class="detail-group">
                <div class="detail-label">Date of Birth</div>
                <div class="detail-value">${student['date of birth'] || 'Not specified'}</div>
            </div>
            
            <div class="detail-group">
                <div class="detail-label">Email</div>
                <div class="detail-value">${student.email || 'Not specified'}</div>
            </div>
            
            <div class="actions" style="margin-top: 20px;">
                <button class="btn btn-accent" onclick="editStudent(${student.id})">
                    <i class="fas fa-edit"></i> Edit Student
                </button>
                <button class="btn btn-danger" onclick="resetPassword(${student.id})">
                    <i class="fas fa-key"></i> Reset Password
                </button>
            </div>
        `;
        
        studentModal.style.display = 'flex';
    };

    const showAutoLoginLink = (studentId) => {
        const student = allUsers.find(u => u.id == studentId);
        if (!student) return alert('User not found.');
        
        // Build the auto-login URL with username and password as params
        const baseUrl = window.location.origin + '/cbt/pages/login-auto-auth.html';
        const loginUrl = `${baseUrl}?user=${encodeURIComponent(student.username)}&pass=${encodeURIComponent(student.password)}&role=${encodeURIComponent(student.role)}`;
        
        // Create modal content for link display and copy button
        modalBody.innerHTML = `
            <h3>Auto-Login Link for ${student.name}</h3>
            <input type="text" value="${loginUrl}" id="autoLoginLinkInput" readonly style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px;">
            <button class="btn btn-primary" id="copyAutoLoginBtn">Copy Link</button>
        `;
        studentModal.style.display = 'flex';
        
        document.getElementById('copyAutoLoginBtn').addEventListener('click', () => {
            const linkInput = document.getElementById('autoLoginLinkInput');
            linkInput.select();
            linkInput.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(linkInput.value).then(() => alert('Link copied to clipboard!')).catch(() => alert('Failed to copy link.'));
        });
    };

    window.showAutoLoginLink = showAutoLoginLink;

    /**
     * Displays an error message
     * @param {string} message - The error message to display
     */
    const showError = (message) => {
        contentArea.innerHTML = `
            <div class="error-message">
                <i class="fas fa-exclamation-triangle fa-2x"></i>
                <h3>Access Error</h3>
                <p>${message}</p>
            </div>
        `;
    };

    window.viewStudent = (studentId) => viewStudentDetails(studentId);
    window.editStudent = (studentId) => alert(`Edit student details for ID: ${studentId}\nThis feature would allow editing student information.`);
    window.resetPassword = (studentId) => {
        if (confirm('Are you sure you want to reset this student\'s password?\nThe student will need to set a new password on next login.')) {
            alert(`Password reset for student ID: ${studentId}\nThis feature would reset the password to a temporary one.`);
        }
    };

    // Close modal when clicking the close button
    closeModal.addEventListener('click', () => {
        studentModal.style.display = 'none';
    });

    // Close modal when clicking outside the modal content
    window.addEventListener('click', (event) => {
        if (event.target === studentModal) {
            studentModal.style.display = 'none';
        }
    });

    // Initialize the application
    initializeApp();
});
    </script>
</body>
</html>
