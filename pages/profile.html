<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="../assets/images/favicon.ico">

<meta name="theme-color" content="#020169" media="(prefers-color-scheme: light)">

<meta name="theme-color" content="#EFC009"  media="(prefers-color-scheme: dark)">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
<link rel="stylesheet" href="../scripts/css/font-awesome.min.css">


    <title>My Profile | SCS CBT System</title>
    <!-- Project Assets -->
    <link rel="icon" type="image/png" href="../assets/images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Required Local Fallback -->
    <link rel="stylesheet" href="../scripts/css/font-awesome.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');

        :root {
            --primary-color: #020169;
            --accent-color: #FEC009;
            --bg-color: #f4f7fe;
            --sidebar-narrow: 80px;
            --sidebar-wide: 260px;
            --text-main: #333;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-3d-sm: 0 4px 6px rgba(2, 1, 105, 0.05), 0 1px 3px rgba(0,0,0,0.05);
            --shadow-3d-lg: 0 15px 35px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* 
        ===================================================================
            1. SLIDING SIDEBAR NAVIGATION
        ===================================================================
        */
        .sidebar {
            width: var(--sidebar-narrow);
            height: 100vh;
            background: var(--primary-color);
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            transition: var(--transition);
            z-index: 1050;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Desktop Hover Slide Effect */
        @media (min-width: 1024px) {
            .sidebar:hover {
                width: var(--sidebar-wide);
            }
        }

        .sidebar-header {
            padding: 25px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }
        .sidebar-header h2 { 
            color: var(--accent-color); 
            margin: 0; 
            font-size: 1.2rem; 
            opacity: 0; 
            transition: var(--transition);
        }
        .sidebar:hover .sidebar-header h2 { opacity: 1; }

        .menu-list { list-style: none; padding: 20px 0; margin: 0; flex-grow: 1; }
        .menu-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border-left: 4px solid transparent;
            white-space: nowrap;
        }
        .menu-item i { min-width: 30px; font-size: 1.2rem; text-align: center; }
        .menu-item span { 
            margin-left: 20px; 
            opacity: 0; 
            transition: opacity 0.2s ease; 
        }
        
        .sidebar:hover .menu-item span { opacity: 1; }

        .menu-item:hover, .menu-item.active {
            background: rgba(255,255,255,0.1);
            color: var(--accent-color);
            border-left-color: var(--accent-color);
        }

        /* 
        ===================================================================
            2. MAIN CONTENT & PROFILE UI
        ===================================================================
        */
        main {
            margin-left: var(--sidebar-narrow);
            padding: 40px;
            transition: var(--transition);
            min-height: 100vh;
        }

        /* Content shifts when sidebar expands on desktop */
        @media (min-width: 1024px) {
            .sidebar:hover + main {
                margin-left: var(--sidebar-wide);
            }
        }

        .profile-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .profile-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-3d-lg);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .profile-banner {
            height: 160px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #05038a 100%);
            position: relative;
        }

        .profile-body {
            padding: 0 40px 40px;
            position: relative;
        }

        .profile-header-flex {
            display: flex;
            align-items: flex-end;
            gap: 30px;
            margin-top: -80px;
            margin-bottom: 40px;
        }

        .profile-picture-container {
            position: relative;
            width: 160px;
            height: 160px;
        }

        .profile-picture {
            width: 100%;
            height: 100%;
            border-radius: 20%;
            object-fit: cover;
            border: 6px solid var(--white);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background: #eee;
        }

        .name-role h1 { margin: 0; font-size: 2.2rem; color: var(--primary-color); }
        .name-role p { 
            margin: 8px 0; 
            color: #666; 
            font-weight: 600; 
            letter-spacing: 1px;
            text-transform: uppercase; 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .name-role p::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
        }

        /* Data Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .info-box {
            padding: 20px;
            background: #f9faff;
            border-radius: 12px;
            border: 1px solid #edf0f7;
            transition: var(--transition);
        }
        .info-box:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent-color); 
            box-shadow: 0 4px 15px rgba(2, 1, 105, 0.04);
        }

        .info-box label { 
            display: block; 
            font-size: 0.75rem; 
            color: #999; 
            text-transform: uppercase; 
            font-weight: 700;
            margin-bottom: 8px; 
        }
        .info-box span { 
            font-weight: 600; 
            color: var(--primary-color); 
            font-size: 1.15rem; 
            word-break: break-all;
        }

        /* 
        ===================================================================
            3. BIRTHDAY COUNTDOWN MODULE
        ===================================================================
        */
        .countdown-card {
            background: linear-gradient(135deg, #FFFdf0 0%, #FFF8E1 100%);
            border: 1.5px solid rgba(254, 192, 9, 0.25);
            border-radius: 16px;
            padding: 25px;
            margin-top: 35px;
            display: flex;
            align-items: center;
            gap: 25px;
            box-shadow: 0 8px 24px rgba(254, 192, 9, 0.08);
            transition: var(--transition);
            transform-style: preserve-3d;
            perspective: 800px;
        }
        .countdown-card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 12px 30px rgba(254, 192, 9, 0.15);
            border-color: var(--accent-color);
        }
        .countdown-icon {
            font-size: 2.8rem;
            color: var(--accent-color);
            background: var(--white);
            padding: 15px;
            border-radius: 50%;
            box-shadow: var(--shadow-3d-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bounce-pulse 2.5s infinite ease-in-out;
        }
        .countdown-details h4 {
            margin: 0 0 5px 0;
            color: var(--primary-color);
            font-size: 1.2rem;
            font-weight: 700;
        }
        .countdown-details p {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
        }
        .countdown-days {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-left: auto;
            background: var(--white);
            padding: 12px 24px;
            border-radius: 50px;
            border: 2px solid var(--accent-color);
            box-shadow: var(--shadow-3d-sm);
            text-align: center;
            white-space: nowrap;
        }

        @keyframes bounce-pulse {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.08) translateY(-4px); }
        }

        /* 
        ===================================================================
            4. MOBILE RESPONSIVENESS
        ===================================================================
        */
        .mobile-top-bar {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: var(--primary-color);
            color: white;
            padding: 0 20px;
            z-index: 1100;
            align-items: center;
            justify-content: space-between;
        }

        @media (max-width: 992px) {
            .mobile-top-bar { display: flex; }
            .sidebar { 
                left: -100%; /* Slide out of view */
                width: var(--sidebar-wide);
            }
            .sidebar.open { left: 0; } /* Slide into view */
            .sidebar .menu-item span, .sidebar-header h2 { opacity: 1; }
            
            main { margin-left: 0; padding: 100px 20px 40px; }
            .profile-header-flex { flex-direction: column; align-items: center; text-align: center; }
            .profile-picture { border-radius: 50%; } /* Circular on mobile */

            .countdown-card {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            .countdown-days {
                margin-left: 0;
                width: 100%;
            }
        }

        .hamburger {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Mobile Navigation Bar -->
    <header class="mobile-top-bar">
        <button class="hamburger" id="menu-toggle"><i class="fas fa-bars"></i></button>
        <span style="font-weight: 700; letter-spacing: 1px;">SCS PROFILE</span>
        <img id="mobile-profile-img" src="../assets/profile_pictures/default.jpeg" style="width:35px; height:35px; border-radius:50%; border: 1px solid var(--accent-color);" alt="Profile">
    </header>

    <!-- Sliding Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>SCS CBT SYSTEM</h2>
        </div>
        <div class="menu-list">
            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-th-large"></i><span>Dashboard</span>
            </a>
            <a href="test-library.html" class="menu-item">
                <i class="fas fa-vial"></i><span>Test Library</span>
            </a>
            <a href="notes.html" class="menu-item">
                <i class="fas fa-book-open"></i><span>Lecture Notes</span>
            </a>
            <a href="profile.html" class="menu-item active">
                <i class="fas fa-user-circle"></i><span>My Profile</span>
            </a>
            <a href="classes.html" class="menu-item">
                <i class="fas fa-users"></i><span>Classes</span>
            </a>
            <a href="#" class="menu-item" id="logout-button" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1);">
                <i class="fas fa-sign-out-alt"></i><span>Secure Logout</span>
            </a>
        </div>
    </nav>

    <main>
        <div class="profile-container">
            <div class="profile-card">
                <div class="profile-banner"></div>
                
                <div class="profile-body">
                    <div class="profile-header-flex">
                        <div class="profile-picture-container">
                            <img id="profile-pic-main" src="../assets/profile_pictures/default.jpeg" alt="User Profile" class="profile-picture">
                        </div>
                        <div class="name-role">
                            <h1 id="profile-display-name">Loading...</h1>
                            <p id="profile-display-role">Authenticating</p>
                        </div>
                    </div>

                    <h3 style="color: var(--primary-color); border-bottom: 2px solid var(--accent-color); display: inline-block; padding-bottom: 5px; margin-bottom: 25px;">
                        System Credentials
                    </h3>

                    <div class="info-grid">
                        <div class="info-box">
                            <label><i class="fas fa-id-badge"></i> Full Name</label>
                            <span id="data-fullname">---</span>
                        </div>
                        <div class="info-box">
                            <label><i class="fas fa-user"></i> Username</label>
                            <span id="data-username">---</span>
                        </div>
                        <div class="info-box">
                            <label><i class="fas fa-fingerprint"></i> System ID</label>
                            <span id="data-id">---</span>
                        </div>
                        <div class="info-box">
                            <label><i class="fas fa-school"></i> Class / Level</label>
                            <span id="data-class">---</span>
                        </div>
                    </div>

                    <!-- Interactive Birthday Countdown Module -->
                    <div class="countdown-card" id="birthday-countdown-container" style="display: none;">
                        <div class="countdown-icon">
                            <i class="fas fa-birthday-cake"></i>
                        </div>
                        <div class="countdown-details">
                            <h4 id="countdown-heading">Personal Milestone</h4>
                            <p id="countdown-subtext">Calculating birthday timeline...</p>
                        </div>
                        <div class="countdown-days" id="countdown-result">
                            -- Days
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.getElementById('menu-toggle');
            const logoutButton = document.getElementById('logout-button');

            // 1. Sliding Sidebar Toggle (Mobile)
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });

            // Close sidebar when clicking outside on mobile
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 992 && 
                    !sidebar.contains(e.target) && 
                    !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            });

            // 2. Logout Logic
            logoutButton.addEventListener('click', (e) => {
                e.preventDefault();
                if(confirm("Are you sure you want to logout?")) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                }
            });

            // 3. Birthday Logic Tool
            function calculateCountdown(dobString) {
                if (!dobString) return null;
                
                const dobParts = dobString.split('-');
                if (dobParts.length !== 3) return null;

                const month = parseInt(dobParts[1], 10) - 1;
                const day = parseInt(dobParts[2], 10);
                
                const today = new Date();
                let nextBirthday = new Date(today.getFullYear(), month, day);

                // If birthday has passed this year, look to next year
                if (today > nextBirthday) {
                    nextBirthday.setFullYear(today.getFullYear() + 1);
                }

                const diffTime = nextBirthday - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                // If it evaluates to 0, or is the exact birthday month and day
                if (diffDays === 365 || diffDays === 0 || (today.getMonth() === month && today.getDate() === day)) {
                    return { days: 0, text: "Happy Birthday!", sub: "🎉 Today is your special day! Enjoy your celebrations! 🎂" };
                }

                return {
                    days: diffDays,
                    text: `${diffDays} Day${diffDays > 1 ? 's' : ''} Left`,
                    sub: `Your birthday is on ${nextBirthday.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}`
                };
            }

            /**
             * 4. DATA FETCHING & UI POPULATION
             * Reads from users.json (or fallback files) based on loggedInUserId
             */
            const loggedInUserId = localStorage.getItem('loggedInUserId');
            
            if (!loggedInUserId) {
                window.location.href = 'login.html';
                return;
            }

            // Fetch User Data
            fetch('../data/users.json')
                .then(res => {
                    if (!res.ok) throw new Error("Could not load database.");
                    return res.json();
                })
                .then(users => {
                    let tempUsers = JSON.parse(localStorage.getItem('tempUsers')) || [];
                    const allUsers = [...users, ...tempUsers];
                    
                    const user = allUsers.find(u => u.id == loggedInUserId);

                    if (user) {
                        // Populate Text
                        document.getElementById('profile-display-name').textContent = user.name || user.username;
                        document.getElementById('profile-display-role').textContent = user.role || 'Member';
                        document.getElementById('data-fullname').textContent = user.name || 'Not Set';
                        document.getElementById('data-username').textContent = user.username || '---';
                        document.getElementById('data-id').textContent = user.id || '---';
                        document.getElementById('data-class').textContent = user.class || 'Unassigned';

                        // Populate Images
                        const pic = user.profilePicture || '../assets/profile_pictures/default.jpeg';
                        document.getElementById('profile-pic-main').src = pic;
                        document.getElementById('mobile-profile-img').src = pic;

                        // Birthday Countdown Logic Integration
                        const dob = user["date of birth"];
                        if (dob) {
                            const countdown = calculateCountdown(dob);
                            if (countdown) {
                                document.getElementById('birthday-countdown-container').style.display = 'flex';
                                document.getElementById('countdown-heading').textContent = "Birthday Countdown";
                                document.getElementById('countdown-subtext').textContent = countdown.sub;
                                document.getElementById('countdown-result').textContent = countdown.text;
                                
                                // Specific styles for active birthday matches
                                if (countdown.days === 0) {
                                    const card = document.getElementById('birthday-countdown-container');
                                    card.style.background = 'linear-gradient(135deg, #FFF0F5 0%, #FFE4E1 100%)';
                                    card.style.borderColor = '#FF69B4';
                                    document.getElementById('countdown-result').style.borderColor = '#FF69B4';
                                    document.getElementById('countdown-result').style.color = '#C71585';
                                }
                            }
                        }
                    } else {
                        console.error("User not found in database.");
                    }
                })
                .catch(err => {
                    console.error("System Error loading user data:", err);
                    document.getElementById('profile-display-name').textContent = "Database Offline";
                });
        });
    </script>
</body>
</html>
