<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise User Data & JSON Utility Suite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary-blue: #020169;
            --accent-gold: #FEC009;
            --background-light: #f1f5f9;
            --white: #ffffff;
            --dark-text: #1e293b;
            --muted-text: #64748b;
            --border-color: #cbd5e1;
            --success-color: #16a34a;
            --error-color: #dc2626;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--background-light);
            color: var(--dark-text);
            padding: 30px 15px;
            line-height: 1.5;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 
        ===================================================================
            HEADER
        ===================================================================
        */
        header {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 24px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 i {
            color: var(--accent-gold);
        }

        header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-top: 2px;
        }

        .system-badge {
            background-color: var(--accent-gold);
            color: var(--primary-blue);
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        /* 
        ===================================================================
            LAYOUT SYSTEM
        ===================================================================
        */
        .workspace {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 25px;
        }

        @media (max-width: 1024px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        /* 
        ===================================================================
            PANELS
        ===================================================================
        */
        .panel {
            background-color: var(--white);
            border-radius: 10px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 20px;
            border-bottom: 2.5px solid var(--accent-gold);
            padding-bottom: 6px;
            display: inline-block;
        }

        /* Controls Panel Form Fields */
        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--dark-text);
            margin-bottom: 8px;
        }

        .form-select, .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--dark-text);
            outline: none;
            transition: var(--transition);
        }

        .form-select:focus, .form-input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(2, 1, 105, 0.1);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            user-select: none;
        }

        .checkbox-label input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-blue);
        }

        /* 
        ===================================================================
            UTILITY BUTTONS
        ===================================================================
        */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary-blue);
            color: var(--white);
        }

        .btn-primary:hover {
            background-color: #0b0a8c;
        }

        .btn-accent {
            background-color: var(--accent-gold);
            color: var(--primary-blue);
        }

        .btn-accent:hover {
            background-color: #e5ac05;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--muted-text);
        }

        .btn-outline:hover {
            background-color: #f8fafc;
            color: var(--dark-text);
        }

        /* 
        ===================================================================
            TAB SYSTEM
        ===================================================================
        */
        .tabs-header {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 20px;
            gap: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 18px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--muted-text);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .tab-btn.active {
            color: var(--primary-blue);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background-color: var(--primary-blue);
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* 
        ===================================================================
            JSON DISPLAY & COMPARISON
        ===================================================================
        */
        .editor-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .editor-box {
            display: flex;
            flex-direction: column;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted-text);
        }

        textarea.editor-area {
            width: 100%;
            height: 380px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            resize: vertical;
            outline: none;
            background-color: #fafafa;
            color: #334155;
            line-height: 1.4;
        }

        textarea.editor-area:focus {
            border-color: var(--primary-blue);
            background-color: var(--white);
        }

        /* 
        ===================================================================
            STATUS MESSAGES & ALERTS
        ===================================================================
        */
        .alert-box {
            padding: 14px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .alert-box.success {
            background-color: #f0fdf4;
            color: var(--success-color);
            border: 1px solid #bbf7d0;
            display: block;
        }

        .alert-box.error {
            background-color: #fef2f2;
            color: var(--error-color);
            border: 1px solid #fecaca;
            display: block;
        }

        .alert-box .fixes-list {
            margin-top: 8px;
            padding-left: 18px;
            font-size: 0.8rem;
            opacity: 0.9;
        }

        /* 
        ===================================================================
            DUPLICATE CARDS VIEW
        ===================================================================
        */
        .duplicate-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 24px;
        }

        .summary-card {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .summary-card .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
        }

        .summary-card .label {
            font-size: 0.75rem;
            color: var(--muted-text);
            font-weight: 600;
            text-transform: uppercase;
        }

        .dup-group-box {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #f8fafc;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .dup-group-header {
            background-color: #e2e8f0;
            padding: 10px 18px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dup-item-row {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-top: 1px solid #e2e8f0;
            background-color: var(--white);
            transition: var(--transition);
        }

        .dup-item-row:hover {
            background-color: #f1f5f9;
        }

        .dup-item-row label {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .dup-item-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--error-color);
        }

        .row-details {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge-meta {
            background-color: #f1f5f9;
            color: var(--dark-text);
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Utility Header -->
        <header>
            <div>
                <h1><i class="fas fa-users-cog"></i> St. Christopher School</h1>
                <p>Enterprise User Registration Data Processor & Cleaner</p>
            </div>
            <span class="system-badge"><i class="fas fa-shield-halved"></i> Data Security Engine v2.1</span>
        </header>

        <div class="workspace">
            
            <!-- Controls Sidebar (Left) -->
            <div class="panel">
                <h2 class="panel-title">Operation Settings</h2>
                
                <div class="control-group">
                    <label for="sort-criterion"><i class="fas fa-arrow-down-a-z"></i> Sort User Array</label>
                    <select id="sort-criterion" class="form-select">
                        <option value="none">None (Preserve Current Order)</option>
                        <option value="username">Sort by Username (A-Z)</option>
                        <option value="name">Sort by Full Name (A-Z)</option>
                        <option value="classid">Sort by Class ID (A-Z)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="reindex-ids" checked />
                        <span>Re-assign User IDs</span>
                    </label>
                </div>

                <div class="control-group" id="start-id-container">
                    <label for="start-id"><i class="fas fa-list-ol"></i> ID Sequence Starts At</label>
                    <input type="number" id="start-id" class="form-input" value="1" min="1" />
                </div>

                <div class="control-group" style="margin-top: 30px;">
                    <button class="btn btn-primary" id="process-raw-btn">
                        <i class="fas fa-magic"></i> Process & Validate
                    </button>
                </div>

                <div class="control-group">
                    <button class="btn btn-outline" id="load-sample-btn">
                        <i class="fas fa-database"></i> Load Sample Data
                    </button>
                </div>
            </div>

            <!-- Workspace Output Area (Right) -->
            <div class="panel">
                
                <!-- Status Notifications Area -->
                <div id="status-alert" class="alert-box"></div>

                <!-- Tabs Menu -->
                <div class="tabs-header">
                    <button class="tab-btn active" id="tab-editor-trigger"><i class="fas fa-code"></i> Main Code Workspace</button>
                    <button class="tab-btn" id="tab-duplicates-trigger" style="display: none;"><i class="fas fa-user-slash"></i> Duplicate Resolve Center</button>
                </div>

                <!-- Tab 1 Pane: Main Editor & Formatter -->
                <div class="tab-pane active" id="tab-editor">
                    <div class="editor-container">
                        <div class="editor-box">
                            <div class="editor-header">
                                <span>Paste Raw Input JSON Below</span>
                                <button class="btn btn-outline" style="padding: 4px 8px; font-size: 0.75rem; width: auto;" onclick="clearInput()">Clear</button>
                            </div>
                            <textarea class="editor-area" id="json-input" placeholder='Paste raw JSON data here...'></textarea>
                        </div>
                        <div class="editor-box">
                            <div class="editor-header">
                                <span>Processed Output Block</span>
                                <button class="btn btn-accent" style="padding: 4px 8px; font-size: 0.75rem; width: auto;" id="copy-output-btn"><i class="far fa-copy"></i> Copy Output</button>
                            </div>
                            <textarea class="editor-area" id="json-output" placeholder='Formatted clean JSON output will print here...' readonly></textarea>
                        </div>
                    </div>
                </div>

                <!-- Tab 2 Pane: Interactive Duplicate Manager -->
                <div class="tab-pane" id="tab-duplicates">
                    <div class="duplicate-summary-grid">
                        <div class="summary-card">
                            <div class="number" id="stats-total">0</div>
                            <div class="label">Total Records</div>
                        </div>
                        <div class="summary-card">
                            <div class="number" id="stats-duplicates">0</div>
                            <div class="label">Identified Duplicates</div>
                        </div>
                        <div class="summary-card" style="border-color: #fecaca;">
                            <div class="number" id="stats-groups" style="color: var(--error-color);">0</div>
                            <div class="label">Unique Group Violations</div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <button class="btn btn-outline" id="keep-first-btn" style="width: auto;"><i class="fas fa-check-double"></i> Keep First (Auto Select Remaining)</button>
                        <button class="btn btn-primary" id="apply-manual-resolution-btn" style="width: auto;"><i class="fas fa-user-check"></i> Apply Selection & Process</button>
                    </div>

                    <div id="duplicate-groups-root"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // State variables
        let parsedData = [];
        let duplicateDataMap = {};
        let manuallySelectedForRemoval = new Set();

        // DOM elements
        const jsonInput = document.getElementById('json-input');
        const jsonOutput = document.getElementById('json-output');
        const sortCriterion = document.getElementById('sort-criterion');
        const reindexIds = document.getElementById('reindex-ids');
        const startId = document.getElementById('start-id');
        const startIdContainer = document.getElementById('start-id-container');
        const statusAlert = document.getElementById('status-alert');
        
        // Buttons
        const processBtn = document.getElementById('process-raw-btn');
        const loadSampleBtn = document.getElementById('load-sample-btn');
        const copyOutputBtn = document.getElementById('copy-output-btn');
        const keepFirstBtn = document.getElementById('keep-first-btn');
        const applyManualResolutionBtn = document.getElementById('apply-manual-resolution-btn');

        // Tabs
        const tabEditorTrigger = document.getElementById('tab-editor-trigger');
        const tabDuplicatesTrigger = document.getElementById('tab-duplicates-trigger');
        const tabEditor = document.getElementById('tab-editor');
        const tabDuplicates = document.getElementById('tab-duplicates');
        const duplicateGroupsRoot = document.getElementById('duplicate-groups-root');

        // Stats Display elements
        const statsTotal = document.getElementById('stats-total');
        const statsDuplicates = document.getElementById('stats-duplicates');
        const statsGroups = document.getElementById('stats-groups');

        // Toggle sequence input field based on configuration
        reindexIds.addEventListener('change', (e) => {
            startIdContainer.style.display = e.target.checked ? 'block' : 'none';
        });

        // Tab selection click logic
        tabEditorTrigger.addEventListener('click', () => switchTab('editor'));
        tabDuplicatesTrigger.addEventListener('click', () => switchTab('duplicates'));

        function switchTab(target) {
            if (target === 'editor') {
                tabEditorTrigger.classList.add('active');
                tabDuplicatesTrigger.classList.remove('active');
                tabEditor.classList.add('active');
                tabDuplicates.classList.remove('active');
            } else {
                tabEditorTrigger.classList.remove('active');
                tabDuplicatesTrigger.classList.add('active');
                tabEditor.classList.remove('active');
                tabDuplicates.classList.add('active');
            }
        }

        function clearInput() {
            jsonInput.value = '';
            jsonOutput.value = '';
            statusAlert.style.display = 'none';
            tabDuplicatesTrigger.style.display = 'none';
            switchTab('editor');
        }

        // Clean JSON formatting and sanitize syntax structures using Regex
        function applySyntaxAutoFixes(raw) {
            let cleanText = raw.trim();
            let fixes = [];

            // Fix 1: Strip standard and invisible whitespaces
            const nonStandardSpaceRegex = /[^\S\r\n]/g;
            if (nonStandardSpaceRegex.test(cleanText)) {
                cleanText = cleanText.replace(nonStandardSpaceRegex, ' ');
                fixes.push('Standardized invisible workspace characters');
            }

            // Fix 2: Remove extra/trailing commas inside nested objects/arrays
            const multiCommaRegex = /,\s*([,}\]])/g;
            if (multiCommaRegex.test(cleanText)) {
                while(multiCommaRegex.test(cleanText)) {
                    cleanText = cleanText.replace(multiCommaRegex, '$1');
                }
                fixes.push('Cleaned invalid trailing commas');
            }

            // Fix 3: Handle single quotes to double quotes replacement on properties
            const singleQuoteKeyRegex = /([{,]\s*)'([^']*)'\s*:/g;
            if (singleQuoteKeyRegex.test(cleanText)) {
                cleanText = cleanText.replace(singleQuoteKeyRegex, '$1"$2":');
                fixes.push('Replaced single quotes on keys with double quotes');
            }

            // Fix 4: Handle single quotes to double quotes replacement on string values
            const singleQuoteValueRegex = /:\s*'([^']*)'/g;
            if (singleQuoteValueRegex.test(cleanText)) {
                cleanText = cleanText.replace(singleQuoteValueRegex, ': "$1"');
                fixes.push('Replaced single quotes on values with double quotes');
            }

            // Fix 5: Wrap unquoted property keys in double quotes
            const unquotedKeyRegex = /([{,]\s*)([a-zA-Z0-9_]+)\s*:/g;
            if (unquotedKeyRegex.test(cleanText)) {
                cleanText = cleanText.replace(unquotedKeyRegex, '$1"$2":');
                fixes.push('Added double quotes to unquoted keys');
            }

            return { text: cleanText, fixes };
        }

        // Group duplicate elements by combination of username and name keys
        function buildDuplicateMap(dataArray) {
            const registry = {};
            const duplicationMap = {};

            dataArray.forEach((item, index) => {
                const userKey = `${(item.username || '').trim().toLowerCase()}|${(item.name || '').trim().toLowerCase()}`;
                
                if (!registry[userKey]) {
                    registry[userKey] = [index];
                } else {
                    registry[userKey].push(index);
                    duplicationMap[userKey] = registry[userKey];
                }
            });

            return duplicationMap;
        }

        // Reassign clean primary keys (IDs) based on sorted state
        function assignSequenceIds(dataArray) {
            const startVal = parseInt(startId.value, 10) || 1;
            return dataArray.map((user, idx) => {
                return {
                    ...user,
                    id: startVal + idx
                };
            });
        }

        // Apply sorting criteria on input array
        function sortCollection(dataArray) {
            const criterion = sortCriterion.value;
            if (criterion === 'username') {
                return [...dataArray].sort((a, b) => (a.username || '').localeCompare(b.username || ''));
            } else if (criterion === 'name') {
                return [...dataArray].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            } else if (criterion === 'classid') {
                return [...dataArray].sort((a, b) => (a.classid || '').localeCompare(b.classid || ''));
            }
            return dataArray;
        }

        // Main execution pathway
        processBtn.addEventListener('click', () => {
            let inputRaw = jsonInput.value.trim();
            if (!inputRaw) {
                showAlert('Input payload is empty. Please enter some data.', 'error');
                return;
            }

            const preprocessResult = applySyntaxAutoFixes(inputRaw);
            
            try {
                parsedData = JSON.parse(preprocessResult.text);
                if (!Array.isArray(parsedData)) {
                    showAlert('Failed Validation: Raw JSON parsed successfully, but is not structured as an array.', 'error');
                    return;
                }

                duplicateDataMap = buildDuplicateMap(parsedData);
                const duplicateGroupKeys = Object.keys(duplicateDataMap);

                if (duplicateGroupKeys.length > 0) {
                    showAlert('Duplicate user registration profiles were detected. Resolution required.', 'error', preprocessResult.fixes);
                    
                    // Activate resolution view options
                    tabDuplicatesTrigger.style.display = 'block';
                    manuallySelectedForRemoval.clear();
                    buildManualResolutionView();
                    switchTab('duplicates');
                } else {
                    // Perform default clean execution
                    tabDuplicatesTrigger.style.display = 'none';
                    finalizeCleanOutput(parsedData, preprocessResult.fixes);
                }

            } catch (error) {
                let diagnosticMessage = `Syntax Parsing Failed: ${error.message}.`;
                
                // Attempt exact column matching logic
                const positionMatch = error.message.match(/at position (\d+)/);
                if (positionMatch && positionMatch[1]) {
                    const pos = parseInt(positionMatch[1], 10);
                    const metrics = calculateMetrics(inputRaw, pos);
                    diagnosticMessage += ` Error resides close to Line ${metrics.line}, Column ${metrics.column}.`;
                }

                showAlert(diagnosticMessage, 'error');
                jsonOutput.value = '';
            }
        });

        // Assemble interactive duplicate resolver view elements
        function buildManualResolutionView() {
            duplicateGroupsRoot.innerHTML = '';
            
            // Total duplication indicators
            let totalDupInstances = 0;
            const duplicateEntries = Object.entries(duplicateDataMap);

            duplicateEntries.forEach(([key, indices]) => {
                totalDupInstances += (indices.length - 1);
            });

            statsTotal.textContent = parsedData.length;
            statsDuplicates.textContent = totalDupInstances;
            statsGroups.textContent = duplicateEntries.length;

            duplicateEntries.forEach(([key, indices], groupIdx) => {
                const groupContainer = document.createElement('div');
                groupContainer.className = 'dup-group-box';
                groupContainer.innerHTML = `
                    <div class="dup-group-header">
                        <span>Group ${groupIdx + 1} (Duplicate Composite: ${key})</span>
                        <span>${indices.length} Matching Records</span>
                    </div>
                `;

                indices.forEach(dataIndex => {
                    const item = parsedData[dataIndex];
                    const row = document.createElement('div');
                    row.className = 'dup-item-row';

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.value = dataIndex;
                    checkbox.id = `dup-chk-${dataIndex}`;

                    // Match selections set
                    if (manuallySelectedForRemoval.has(dataIndex)) {
                        checkbox.checked = true;
                    }

                    checkbox.addEventListener('change', (e) => {
                        const val = parseInt(e.target.value, 10);
                        if (e.target.checked) {
                            manuallySelectedForRemoval.add(val);
                        } else {
                            manuallySelectedForRemoval.delete(val);
                        }
                    });

                    const label = document.createElement('label');
                    label.setAttribute('for', `dup-chk-${dataIndex}`);
                    label.appendChild(checkbox);

                    const contentDetails = document.createElement('div');
                    contentDetails.className = 'row-details';
                    contentDetails.innerHTML = `
                        <div><strong>Index:</strong> <span class="badge-meta">${dataIndex}</span></div>
                        <div><strong>ID:</strong> <span class="badge-meta">${item.id || 'N/A'}</span></div>
                        <div><strong>Name:</strong> <span class="badge-meta">${item.name || 'N/A'}</span></div>
                        <div><strong>Username:</strong> <span class="badge-meta">${item.username || 'N/A'}</span></div>
                        <div><strong>Class:</strong> <span class="badge-meta">${item.class || 'N/A'} (${item.classid || 'N/A'})</span></div>
                    `;

                    label.appendChild(contentDetails);
                    row.appendChild(label);
                    groupContainer.appendChild(row);
                });

                duplicateGroupsRoot.appendChild(groupContainer);
            });
        }

        // Select duplicates (keep first in each group)
        keepFirstBtn.addEventListener('click', () => {
            manuallySelectedForRemoval.clear();
            Object.values(duplicateDataMap).forEach(indices => {
                // Skip index 0 (keep first) and flag remaining rows for removal
                indices.slice(1).forEach(idx => {
                    manuallySelectedForRemoval.add(idx);
                });
            });
            buildManualResolutionView();
        });

        // Apply selections from Duplicate Resolve Center
        applyManualResolutionBtn.addEventListener('click', () => {
            if (manuallySelectedForRemoval.size === 0) {
                alert('No elements have been selected for cleanup resolution.');
                return;
            }

            const filteredData = parsedData.filter((_, idx) => !manuallySelectedForRemoval.has(idx));
            finalizeCleanOutput(filteredData, ['Pruned selected user registration duplicates']);
            switchTab('editor');
        });

        // Format and finalize output pipeline
        function finalizeCleanOutput(dataArray, fixesList = []) {
            let processed = sortCollection(dataArray);

            if (reindexIds.checked) {
                processed = assignSequenceIds(processed);
                fixesList.push('Reassigned user ID indices sequentially');
            }

            jsonOutput.value = JSON.stringify(processed, null, 2);
            showAlert('Clean validation output parsed successfully.', 'success', fixesList);
        }

        // Copy raw output array clipboard wrapper
        copyOutputBtn.addEventListener('click', () => {
            const outVal = jsonOutput.value.trim();
            if (!outVal) return;
            
            navigator.clipboard.writeText(outVal).then(() => {
                copyOutputBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    copyOutputBtn.innerHTML = '<i class="far fa-copy"></i> Copy Output';
                }, 2000);
            }).catch(() => {
                alert('An error occurred copying output to the clipboard.');
            });
        });

        function calculateMetrics(text, pos) {
            let line = 1, column = 1;
            for (let i = 0; i < pos; i++) {
                if (text[i] === '\n') {
                    line++;
                    column = 1;
                } else {
                    column++;
                }
            }
            return { line, column };
        }

        function showAlert(text, type, fixes = []) {
            statusAlert.textContent = '';
            statusAlert.className = `alert-box ${type}`;
            
            const textNode = document.createElement('div');
            textNode.innerHTML = `<strong>${type === 'success' ? '<i class="fas fa-check-circle"></i> Success' : '<i class="fas fa-exclamation-triangle"></i> Error'}</strong>: ${text}`;
            statusAlert.appendChild(textNode);

            if (fixes.length > 0) {
                const list = document.createElement('ul');
                list.className = 'fixes-list';
                fixes.forEach(fix => {
                    const li = document.createElement('li');
                    li.textContent = `Applied fix: ${fix}`;
                    list.appendChild(li);
                });
                statusAlert.appendChild(list);
            }

            statusAlert.style.display = 'block';
        }
